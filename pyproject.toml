[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "DJ"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
addopts = "--ds=config.settings.test"
python_files = ["test_*.py", "*_tests.py", "tests.py"]