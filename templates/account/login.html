{% extends "account/base.html" %}
{% load i18n %}

{% block inner_content %}
<h1>{% translate "Вхід" %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">{% translate "Увійти" %}</button>
</form>
<p class="mt-3"><a href="{% url 'account_signup' %}">{% translate "Ще немає акаунта? Зареєструватися" %}</a></p>
{% endblock %}
