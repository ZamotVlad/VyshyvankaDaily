{% extends "account/base.html" %}
{% load i18n %}

{% block inner_content %}
<h1>{% translate "Реєстрація" %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">{% translate "Зареєструватися" %}</button>
</form>

{% if SOCIALACCOUNT_ENABLED %}
  {% include "socialaccount/snippets/login.html" with page_layout="entrance" %}
{% endif %}
{% endblock %}
