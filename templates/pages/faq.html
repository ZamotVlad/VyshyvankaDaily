{% extends "base.html" %}
{% load i18n %}

{% block title %}FAQ — VyshyvankaDaily{% endblock %}

{% block content %}
<h1>FAQ</h1>
<div class="accordion" id="faqAccordion">
  {% for category in categories %}
    <h4 class="mt-3">{{ category.name }}</h4>
    {% for item in category.items.all %}
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#faq{{ item.pk }}">
            {{ item.question }}
          </button>
        </h2>
        <div id="faq{{ item.pk }}" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">
          <div class="accordion-body">{{ item.answer }}</div>
        </div>
      </div>
    {% endfor %}
  {% endfor %}
</div>
{% endblock %}
